name: mtrx-test-3
on: pull_request

jobs:
  check-changes:
    name: Check for code changes
    runs-on: ubuntu-latest
    outputs:
      has-code-changes: ${{ steps.check.outputs.result }}
    steps:
      - name: Check for changes
        id: check
        run: |
          echo "Checking for code changes..."
          echo "result=true" >> "$GITHUB_OUTPUT"
          echo "Code changes detected!"

  linter:
    name: Linter
    needs: check-changes
    if: needs.check-changes.outputs.has-code-changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Run linter
        run: |
          echo "Running linter..."
          sleep 2
          echo "Linter passed!"

  type-check:
    name: Type Check
    needs: check-changes
    if: needs.check-changes.outputs.has-code-changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Run type check
        run: |
          echo "Running type check..."
          sleep 2
          echo "Type check passed!"

  schema-integrity:
    name: Schema Integrity (Core)
    needs: check-changes
    if: needs.check-changes.outputs.has-code-changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check schema integrity
        run: |
          echo "Checking schema integrity..."
          sleep 1
          echo "Schema integrity check passed!"

  test:
    name: Unit & Integration Tests (${{ matrix.test_group }})
    needs: check-changes
    if: needs.check-changes.outputs.has-code-changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test_group: [core-service, lambdas, other]
        include:
          - test_group: core-service
            label: core-service tests
          - test_group: lambdas
            label: lambda tests
          - test_group: other
            label: other tests
    steps:
      - name: Run tests
        run: |
          echo "Running ${{ matrix.label }}..."
          sleep 3
          echo "All ${{ matrix.test_group }} tests passed!"

  test-report:
    name: Test Report
    needs: [check-changes, test]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Generate test report
        run: |
          echo "Generating test report..."
          echo "All test groups completed successfully."

  build-artifacts:
    name: Build & Publish Artifacts
    needs: [check-changes, test]
    if: false
    runs-on: ubuntu-latest
    steps:
      - name: Build artifacts
        run: |
          echo "Building artifacts..."
          echo "Artifacts published."

