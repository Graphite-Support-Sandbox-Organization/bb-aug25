name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check-changes:
    name: Check for code changes
    runs-on: ubuntu-latest
    outputs:
      has-code-changes: $ steps.set.outputs.has-code-changes 
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Fake change detection (always true)
      - id: set
        name: Set has-code-changes
        run: echo "has-code-changes=true" >> "$GITHUB_OUTPUT"

  test:
    name: Unit & Integration Tests ($ matrix.test_group )
    needs: check-changes
    if: needs.check-changes.outputs.has-code-changes == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test_group: [lambdas, core-service, other]
        include:
          - test_group: lambdas
            test_command: "echo 'Running fake lambdas tests' && sleep 10"
          - test_group: core-service
            test_command: "echo 'Running fake core-service tests' && sleep 10"
          - test_group: other
            test_command: "echo 'Running fake other tests' && sleep 10"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run fake tests
        run: |
          echo "Group: $ matrix.test_group "
          echo "Command: $ matrix.test_command "
          bash -lc "$ matrix.test_command "

  test-report:
    name: Test Report
    needs: [check-changes, test]
    runs-on: ubuntu-latest
    # Run after the matrix finishes, even if some legs fail (but not if cancelled)
    if: (needs.check-changes.outputs.has-code-changes == 'true' || github.event_name == 'push') && always() && !cancelled()
    steps:
      - name: Report summary
        run: |
          echo "Fake report step"
          echo "Matrix overall result: $ needs.test.result "
          sleep 2
