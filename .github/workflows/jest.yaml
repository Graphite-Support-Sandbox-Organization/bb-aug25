name: Jest Tests with CI Optimization

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches-ignore:
      - "**/graphite-base/**"

jobs:

  echo_var:
    runs-on: ubuntu-latest
    needs: optimize_ci
    steps:
        - name: Checkout code
          run: echo ${{needs.optimize_ci.outputs.skip}}
  
  smoke_tests:
    runs-on: ubuntu-latest
    steps:
        - name: Checkout code
          uses: actions/checkout@v4
        - name: Sleep/Delay timer
          run: sleep 35
        - name: CI smoke test
          run: echo "✅ CI is running"
